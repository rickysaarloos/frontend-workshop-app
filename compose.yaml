name: studiedag-frontend

services:

  frontend-dev:
    container_name: studiedag-frontend-dev
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - studiedag-frontend-node-modules:/app/node_modules
    environment:
      VITE_API_URL: ${VITE_API_URL}
    ports:
      - "5173:5173"
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"

volumes:
  studiedag-frontend-node-modules:
